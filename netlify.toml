[build]
  publish = "dist"
  # Regenerate the inventory JSON from the Excel sheets, then build the site
  command = "pip3 install --quiet openpyxl && python3 scripts/sync_inventory.py && npm run build:static"

# SPA: every route serves the app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
